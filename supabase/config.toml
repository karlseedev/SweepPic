# =============================================================================
# Supabase 로컬 개발 환경 설정
# 프로젝트: SweepPic 초대 리워드 (004-referral-reward)
# =============================================================================

# project id는 supabase link --project-ref 로 설정됨

# -----------------------------------------------------------------------------
# API 설정
# -----------------------------------------------------------------------------
[api]
# 로컬 API 포트
port = 54321
# API 스키마 노출
schemas = ["public"]
# 추가 스키마 검색 경로
extra_search_path = ["public"]
# 최대 반환 행 수
max_rows = 1000

# -----------------------------------------------------------------------------
# 데이터베이스 설정
# -----------------------------------------------------------------------------
[db]
# 로컬 PostgreSQL 포트
port = 54322
# PostgreSQL 메이저 버전
major_version = 17

# -----------------------------------------------------------------------------
# Supabase Studio (로컬 관리 UI)
# -----------------------------------------------------------------------------
[studio]
port = 54323

# -----------------------------------------------------------------------------
# 인증 (이 프로젝트에서는 비활성화 — Keychain UUID 기반 인증 사용)
# -----------------------------------------------------------------------------
[auth]
enabled = false

# -----------------------------------------------------------------------------
# 스토리지 (이 프로젝트에서는 미사용)
# -----------------------------------------------------------------------------
[storage]
enabled = false

# -----------------------------------------------------------------------------
# Edge Functions 설정
# -----------------------------------------------------------------------------

# referral-api: JWT 검증 비활성화
# 이유: Supabase 신규 키 형식(sb_publishable_)은 Gateway JWT 검증 미지원
# 보안: user_id 필수 검증 + rate limiting + 비즈니스 로직으로 대체
# 참조: https://github.com/orgs/supabase/discussions/41834
[functions.referral-api]
verify_jwt = false

# referral-landing: 랜딩 페이지 — JWT 불필요 (공개 GET 요청)
# 초대 링크 클릭 시 브라우저에서 접근하므로 인증 헤더 없음
[functions.referral-landing]
verify_jwt = false

# offer-code-replenish: Offer Code 풀 자동 보충 (T045)
# 매일 새벽 3시 KST (= UTC 18:00) 실행
# - offer_name별 available 코드 5,000개 미만 시 ASC API로 보충
# - 만료된 코드 정리 (expires_at < now() → status='expired')
# ⚠️ Supabase Dashboard > Edge Functions에서 cron 설정 필요:
#    함수: offer-code-replenish
#    스케줄: 0 18 * * * (UTC) = 매일 새벽 3시 KST
#    CLI config.toml에서는 schedule 키를 지원하지 않음 (T046)
[functions.offer-code-replenish]
verify_jwt = false
