# =============================================================================
# Supabase 로컬 개발 환경 설정
# 프로젝트: SweepPic 초대 리워드 (004-referral-reward)
# =============================================================================

[project]
id = "sweeppic-referral"

# -----------------------------------------------------------------------------
# API 설정
# -----------------------------------------------------------------------------
[api]
# 로컬 API 포트
port = 54321
# API 스키마 노출
schemas = ["public"]
# 추가 스키마 검색 경로
extra_search_path = ["public"]
# 최대 반환 행 수
max_rows = 1000

# -----------------------------------------------------------------------------
# 데이터베이스 설정
# -----------------------------------------------------------------------------
[db]
# 로컬 PostgreSQL 포트
port = 54322
# PostgreSQL 메이저 버전
major_version = 15

# -----------------------------------------------------------------------------
# Supabase Studio (로컬 관리 UI)
# -----------------------------------------------------------------------------
[studio]
port = 54323

# -----------------------------------------------------------------------------
# 인증 (이 프로젝트에서는 비활성화 — Keychain UUID 기반 인증 사용)
# -----------------------------------------------------------------------------
[auth]
enabled = false

# -----------------------------------------------------------------------------
# 스토리지 (이 프로젝트에서는 미사용)
# -----------------------------------------------------------------------------
[storage]
enabled = false

# -----------------------------------------------------------------------------
# Edge Functions 설정
# -----------------------------------------------------------------------------

# offer-code-replenish: Offer Code 풀 자동 보충
# 매일 새벽 3시 KST (= UTC 18:00) 실행
# - offer_name별 available 코드 5,000개 미만 시 ASC API로 보충
# - 만료된 코드 정리
[functions.offer-code-replenish]
schedule = "0 18 * * *"
